services:
  - type: web
    name: ai-expense-tracker-backend
    env: python
    plan: free
    buildCommand: "pip install -r backend/requirements.txt && python backend/manage.py migrate && python backend/manage.py collectstatic --noinput"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:8000"
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        fromBuild: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com,.herokuapp.com"
      - key: DATABASE_URL
        fromDatabase:
          name: ai-expense-tracker-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: ai-expense-tracker-redis
          type: redis
          property: connectionString

  - type: web
    name: ai-expense-tracker-frontend
    env: node
    plan: free
    buildCommand: "cd frontend && npm install && npm run build"
    startCommand: "cd frontend && npm run preview"
    staticSite: false
    envVars:
      - key: VITE_API_URL
        fromService:
          name: ai-expense-tracker-backend
          property: renderURL
          path: /api/v1

  - type: background
    name: ai-expense-tracker-celery
    env: python
    plan: free
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "celery -A config worker -l info"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai-expense-tracker-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: ai-expense-tracker-redis
          type: redis
          property: connectionString

databases:
  - name: ai-expense-tracker-db
    plan: free

services:
  - type: pserv
    name: ai-expense-tracker-redis
    plan: free
